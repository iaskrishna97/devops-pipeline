name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  bulid:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: Install dependencies
        run: npm Install

      - name: Run tests
        run: npm tests
